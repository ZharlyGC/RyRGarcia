<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Contacto | RYR GARCÍA</title>

<style>
:root{
  --bg:#0b0f14;
  --card:#121a24;
  --text:#ffffff;
  --muted:#9fb0c0;
  --accent:#22c55e;
  --line:#1f2a37;
}

body{
  margin:0;
  font-family:Arial, sans-serif;
  background:var(--bg);
  color:var(--text);
  text-align:center;
}

/* NAVBAR */
.navbar{
  position:sticky;
  top:0;
  z-index:100;
  background:rgba(11,15,20,.92);
  backdrop-filter: blur(10px);
  border-bottom:1px solid var(--line);
}
.nav-inner{
  max-width:1100px;
  margin:auto;
  padding:10px 20px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:12px;
}
.nav-left{
  display:flex;
  align-items:center;
  gap:18px;
  flex-wrap:wrap;
}
.nav-logo{
  height:65px;
  width:auto;
}
.nav-links{
  display:flex;
  flex-wrap:wrap;
  gap:10px;
}
.nav-links a{
  color:var(--text);
  text-decoration:none;
  font-weight:bold;
  padding:10px 12px;
  border-radius:12px;
  border:1px solid transparent;
}
.nav-links a:hover{
  border-color:var(--line);
  background:#0f172a;
}
.nav-cta{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
}
.btn-cat{
  background:#0f172a;
  padding:10px 14px;
  border-radius:10px;
  text-decoration:none;
  color:white;
  border:1px solid var(--line);
  font-weight:900;
}
.btn-wa{
  background:var(--accent);
  padding:10px 14px;
  border-radius:10px;
  text-decoration:none;
  color:#06230f;
  font-weight:900;
}

/* CONTENIDO */
.container{
  max-width:900px;
  margin:auto;
  padding:40px 20px 110px; /* espacio para el botón flotante */
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:20px;
  margin-top:30px;
}

.card{
  background:var(--card);
  padding:25px;
  border-radius:12px;
  border:1px solid var(--line);
}

.btn{
  display:inline-block;
  margin-top:10px;
  padding:12px 20px;
  background:var(--accent);
  color:#06230f;
  text-decoration:none;
  border-radius:10px;
  font-weight:900;
}
p{ color: var(--muted); }

/* BOTÓN FLOTANTE WHATSAPP */
.wa-float{
  position:fixed;
  right:20px;
  bottom:20px;
  z-index:200;
  background:var(--accent);
  color:#06230f;
  padding:14px 18px;
  border-radius:999px;
  font-weight:900;
  text-decoration:none;
  box-shadow:0 10px 30px rgba(34,197,94,.22);
}
</style>
</head>

<body>

<div class="navbar">
  <div class="nav-inner">
    <div class="nav-left">
      <a href="index.html" aria-label="Ir a inicio">
        <img src="logo.png" alt="RYR GARCÍA" class="nav-logo">
      </a>

      <div class="nav-links">
        <a href="index.html">Inicio</a>
        <a href="catalogo.html">Productos</a>
        <a href="contacto.html">Contacto</a>
        <a href="ubicacion.html">Ubicación</a>
      </div>
    </div>

    <div class="nav-cta">
      <a class="btn-cat" href="catalogo.html">Ver Catálogo</a>
      <a class="btn-wa" id="navWaBtn" href="#" target="_blank" rel="noopener">WhatsApp</a>
    </div>
  </div>
</div>

<div class="container">
  <h1>Contáctanos</h1>
  <p>Elige el medio que prefieras</p>

  <div class="grid">
    <div class="card">
      <h3>WhatsApp</h3>
      <a class="btn" href="https://wa.me/5218115557477" target="_blank" rel="noopener">Enviar mensaje</a>
    </div>

    <div class="card">
      <h3>Llamar</h3>
      <a class="btn" href="tel:+528115557477">Llamar ahora</a>
    </div>

    <div class="card">
      <h3>Correo</h3>
      <a class="btn" href="mailto:ventas@ryrgarcia.com.mx">Enviar correo</a>
    </div>
  </div>
</div>

<a class="wa-float" id="waFloat" href="#" target="_blank" rel="noopener">WhatsApp</a>

<script>
  const WHATSAPP_NUMBER = "5218115557477"; // cambia si lo necesitas
  const message = "Hola, quiero información sobre sus compresores nuevos.";

  const navWaBtn = document.getElementById("navWaBtn");
  const waFloat = document.getElementById("waFloat");

  const link = `https://wa.me/${WHATSAPP_NUMBER}?text=${encodeURIComponent(message)}`;

  if(navWaBtn) navWaBtn.href = link;
  if(waFloat) waFloat.href = link;
</script>

</body>
</html>
