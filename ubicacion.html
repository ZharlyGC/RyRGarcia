<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Ubicación | RYR GARCÍA</title>

<style>
:root{
  --bg:#0b0f14;
  --card:#121a24;
  --text:#ffffff;
  --muted:#9fb0c0;
  --accent:#22c55e;
  --line:#1f2a37;
}

body{
  margin:0;
  font-family:Arial, sans-serif;
  background:var(--bg);
  color:var(--text);
  text-align:center;
}

/* NAVBAR */
.navbar{
  position:sticky;
  top:0;
  z-index:100;
  background:rgba(11,15,20,.92);
  backdrop-filter: blur(10px);
  border-bottom:1px solid var(--line);
}

.nav-inner{
  max-width:1100px;
  margin:auto;
  padding:10px 20px;
  display:flex;
  align-items:center;
  justify-content:space-between;
}

.nav-left{
  display:flex;
  align-items:center;
  gap:18px;
}

.nav-logo{
  height:65px;
}

.nav-links{
  display:flex;
  gap:10px;
}

.nav-links a{
  color:var(--text);
  text-decoration:none;
  font-weight:bold;
  padding:10px 12px;
  border-radius:12px;
}

.nav-links a:hover{
  background:#0f172a;
}

.nav-cta{
  display:flex;
  gap:10px;
}

.btn-cat{
  background:#0f172a;
  padding:10px 14px;
  border-radius:10px;
  text-decoration:none;
  color:white;
  border:1px solid var(--line);
  font-weight:900;
}

.btn-wa{
  background:var(--accent);
  padding:10px 14px;
  border-radius:10px;
  text-decoration:none;
  color:#06230f;
  font-weight:900;
}

/* CONTENIDO */

.container{
  max-width:900px;
  margin:auto;
  padding:60px 20px 120px;
}

.btn{
  display:inline-block;
  margin-top:20px;
  padding:14px 25px;
  background:var(--accent);
  color:#06230f;
  text-decoration:none;
  border-radius:10px;
  font-weight:bold;
}

/* BOTÓN WHATSAPP FLOTANTE */

.wa-float{
  position:fixed;
  right:20px;
  bottom:20px;
  background:var(--accent);
  color:#06230f;
  padding:14px 18px;
  border-radius:50px;
  font-weight:bold;
  text-decoration:none;
  box-shadow:0 10px 30px rgba(34,197,94,.3);
}
</style>
</head>

<body>

<div class="navbar">
  <div class="nav-inner">
    <div class="nav-left">

      <a href="index.html">
        <img src="logo.png" class="nav-logo">
      </a>

      <div class="nav-links">
        <a href="index.html">Inicio</a>
        <a href="catalogo.html">Productos</a>
        <a href="contacto.html">Contacto</a>
        <a href="ubicacion.html">Ubicación</a>
      </div>

    </div>

    <div class="nav-cta">
      <a class="btn-cat" href="catalogo.html">Ver Catálogo</a>
      <a class="btn-wa" id="navWaBtn" target="_blank">WhatsApp</a>
    </div>

  </div>
</div>

<div class="container">

<h1>Nuestra Ubicación</h1>

<p>Monterrey, Nuevo León, México</p>

<a class="btn"
href="https://maps.app.goo.gl/2iKxBAbL4ocBiabn9"
target="_blank">
Abrir en Google Maps
</a>

</div>

<a class="wa-float" id="waFloat" target="_blank">WhatsApp</a>

<script>

const WHATSAPP_NUMBER = "5218115557477";

const message = "Hola, quiero información sobre sus compresores.";

const link = `https://wa.me/${WHATSAPP_NUMBER}?text=${encodeURIComponent(message)}`;

document.getElementById("navWaBtn").href = link;
document.getElementById("waFloat").href = link;

</script>

</body>
</html>
